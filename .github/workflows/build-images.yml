name: Build and push images

on:
  push:
    branches: [master]
    paths:
      - "modern-democracy/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: democracy-server
            context: modern-democracy/server
            build_args: ""
          - name: democracy-web
            context: modern-democracy
            build_args: |
              VITE_API_BASE=
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          # Cluster nodes are mostly arm64 with one amd64; build both.
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/radicalgeek/${{ matrix.name }}:latest
            ghcr.io/radicalgeek/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
