services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=democracy
      - POSTGRES_PASSWORD=democracy
      - POSTGRES_DB=democracy
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U democracy"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://democracy:democracy@db:5432/democracy
      - PORT=8787
      # AI calls go through the LiteLLM router in the k8s cluster (Anthropic
      # /v1/messages wire format). Default assumes a local port-forward:
      #   kubectl port-forward -n dev-team svc/dev-team-litellm-router 4000:4000
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:4000}
      - LLM_MODEL=${LLM_MODEL:-router-local}
      - LLM_API_KEY=${LLM_API_KEY:-}
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./server
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      - DATABASE_URL=postgres://democracy:democracy@db:5432/democracy
      # Demo seeding exercises the real credential -> ballot -> checkpoint
      # pipeline with labelled demo users so the map shows aggregate-driven data.
      - DEMO_SEED=${DEMO_SEED:-true}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:4000}
      - LLM_MODEL=${LLM_MODEL:-router-local}
      - LLM_API_KEY=${LLM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  democracy:
    build:
      context: .
      args:
        - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8787}
    ports:
      - "4173:4173"
    environment:
      - VITE_PARLIAMENT_LIVE=true
    depends_on:
      - api

volumes:
  db-data:
